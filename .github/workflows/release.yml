name: Release

# mainブランチへのプッシュ（PRマージを含む）時に実行する
on:
  push:
    branches:
      - main

jobs:
  release:
    name: バージョンタグを付けてリリースを作成する
    runs-on: ubuntu-latest

    permissions:
      contents: write  # タグ・Releaseの作成に必要

    steps:
      # リポジトリをチェックアウトする
      - name: チェックアウト
        uses: actions/checkout@v4

      # manifest.json からバージョン番号を取得する
      - name: バージョン番号を取得する
        id: version
        run: |
          VERSION=$(jq -r '.version' src/manifest.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      # 同じバージョンのタグがすでに存在する場合はスキップする
      - name: タグの重複チェック
        id: tag_check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ タグ ${TAG} はすでに存在するためリリースをスキップします"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ タグ ${TAG} は新規です。リリースを作成します"
          fi

      # src/ ディレクトリの内容をZIP化する（ストア申請と同じ手順）
      - name: 拡張機能をZIP化する
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p ComfyWatch-for-YouTube
          cp -r src/* ComfyWatch-for-YouTube/
          zip -r ComfyWatch-for-YouTube-${{ steps.version.outputs.version }}.zip ComfyWatch-for-YouTube/ --exclude "*.DS_Store"
          echo "✅ ZIP作成完了"
          ls -lh ComfyWatch-for-YouTube-${{ steps.version.outputs.version }}.zip

      # GitHubの自動生成リリースノート機能で生成
      - name: リリースノートを作成する
        id: release_note
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GENERATE_NOTES=$(gh api /repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/releases/generate-notes -f tag_name="${{ steps.version.outputs.tag }}" --jq .body)

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$GENERATE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      # Releaseを作成してZIPをアセットとして添付する
      - name: Releaseを作成する
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ComfyWatch for YouTube ${{ steps.version.outputs.tag }}
          body: |
            ${{ steps.release_note.outputs.notes }}

            ---

            ### インストール方法
            1. `ComfyWatch-for-YouTube-${{ steps.version.outputs.version }}.zip` をダウンロードして解凍する
            2. `chrome://extensions/` を開く
            3. 「デベロッパーモード」をオンにする
            4. 「パッケージ化されていない拡張機能を読み込む」で解凍したフォルダを選択する
          files: ComfyWatch-for-YouTube-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
